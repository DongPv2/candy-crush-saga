<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Candy Crush Saga</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      touch-action: none; /* ngăn scroll/zoom khi chơi */
    }

    #no-canvas {
      display: none;
      color: #fff;
      font-family: sans-serif;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="no-canvas">
    Trình duyệt của bạn không hỗ trợ HTML5 Canvas.<br />
    Vui lòng cập nhật trình duyệt để chơi game.
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
