<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Candy Crush Saga</title>
  <link rel="stylesheet" href="ui.css" />
  <style>
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #game-canvas { display: block; touch-action: none; }
    #no-canvas { display: none; color: #fff; font-family: sans-serif; font-size: 1.2rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="no-canvas">
    Trình duyệt của bạn không hỗ trợ HTML5 Canvas.<br />
    Vui lòng cập nhật trình duyệt để chơi game.
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
